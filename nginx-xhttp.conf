# Nginx reverse proxy config for Xray xhttp inbound behind Bunny CDN
#
# ROOT CAUSE of 504s:
#   proxy_buffering defaults to ON — nginx waits for the complete response
#   before forwarding to Bunny CDN. xhttp (packet-up) is a long-lived stream
#   that never "completes", so Bunny CDN times out (~2s default).
#
# Fix: proxy_buffering off + proxy_request_buffering off
#
# Also set in Bunny CDN pull zone:
#   Origin Response Timeout → 60s or higher (default is ~2s)

server {
    listen 443 ssl;
    server_name your-domain.com;  # replace with your domain

    ssl_certificate     /var/lib/marzban/certs/your-domain.cer;
    ssl_certificate_key /var/lib/marzban/certs/your-domain.cer.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:2027;  # Xray VLESS-XHTTP-NOTLS inbound port
        proxy_http_version 1.1;

        # Critical: disable buffering so Bunny CDN gets the 200 immediately
        proxy_buffering off;
        proxy_request_buffering off;

        # xhttp keeps connections open — use long timeouts
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        chunked_transfer_encoding on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
